<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta Contábil - Minhas Propostas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>
    <!-- Menu Lateral -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Proposta Contábil</div>
        </div>
        
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">
                <i class="fas fa-chart-line"></i>
                <span class="menu-text">Dashboard</span>
            </a>
            <a href="gerar-proposta.html" class="menu-item">
                <i class="fas fa-plus-circle"></i>
                <span class="menu-text">Gerar nova proposta</span>
            </a>
            <a href="minhas-propostas.html" class="menu-item active">
                <i class="fas fa-file-alt"></i>
                <span class="menu-text">Minhas propostas</span>
            </a>
            <a href="clientes.html" class="menu-item">
                <i class="fas fa-users"></i>
                <span class="menu-text">Cadastro de clientes</span>
            </a>
            <a href="configuracoes.html" class="menu-item">
                <i class="fas fa-cog"></i>
                <span class="menu-text">Configurações</span>
            </a>
        </nav>
        
        <div class="toggle-btn" id="toggleBtn">
            <i class="fas fa-chevron-left"></i>
        </div>
    </div>

    <!-- Área Principal -->
    <div class="main-content">
        <header class="header">
            <h1>Minhas Propostas</h1>
            <div class="user-info">
                <span id="welcomeUser">Bem-vindo!</span>
                <div class="user-avatar" id="userAvatar">U</div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </header>

        <main class="content">
            <!-- Filtros e Ações -->
            <div class="filters-section">
                <div class="filters-left">
                    <div class="filter-group">
                        <label>Status</label>
                        <select class="filter-control" id="filterStatus" onchange="filterProposals()">
                            <option value="">Todos</option>
                            <option value="enviada">Enviada</option>
                            <option value="negociacao">Em Negociação</option>
                            <option value="contratada">Contratada</option>
                            <option value="rejeitada">Rejeitada</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Cliente</label>
                        <input type="text" class="filter-control" id="filterClient" placeholder="Buscar cliente..." onkeyup="filterProposals()">
                    </div>
                    
                    <div class="filter-group">
                        <label>Período</label>
                        <select class="filter-control" id="filterPeriod" onchange="filterProposals()">
                            <option value="">Todos</option>
                            <option value="hoje">Hoje</option>
                            <option value="semana">Esta semana</option>
                            <option value="mes">Este mês</option>
                            <option value="ano">Este ano</option>
                        </select>
                    </div>
                </div>
                
                <a href="gerar-proposta.html" class="btn-new-proposal">
                    <i class="fas fa-plus"></i>
                    Nova Proposta
                </a>
            </div>

            <!-- Lista de Propostas -->
            <div class="proposals-container">
                <div class="proposals-header">
                    <h3>Lista de Propostas</h3>
                </div>
                
                <div class="proposals-list" id="proposalsList">
                    <!-- Propostas serão carregadas dinamicamente -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Visualização -->
    <div id="proposalModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Detalhes da Proposta</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalContent">
                <!-- Conteúdo será preenchido dinamicamente -->
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
