<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta Contábil - Sistema de Gestão</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="src/assets/css/main.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="src/assets/images/favicon.ico">
</head>
<body>
    <!-- Tela de Login -->
    <div id="login-screen" class="login-screen">
        <div class="login-container">
            <div class="login-header">
                <h1>Proposta Contábil</h1>
                <p>Sistema de Gestão de Propostas</p>
            </div>
            
            <div class="login-content">
                <div id="login-alert"></div>
                
                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="username" class="form-label">Usuário ou Email</label>
                        <input type="text" id="username" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
                
                <div class="login-footer">
                    <p>Usuário padrão: <strong>admin</strong> | Senha: <strong>123456</strong></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Aplicação Principal -->
    <div id="main-app" class="main-app" style="display: none;">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <a href="#" class="logo">Proposta Contábil</a>
            </div>
            
            <nav class="sidebar-menu">
                <a href="#dashboard" class="menu-item active" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                
                <a href="#gerar-proposta" class="menu-item" data-page="gerar-proposta">
                    <i class="fas fa-file-plus"></i>
                    <span>Gerar Proposta</span>
                </a>
                
                <a href="#minhas-propostas" class="menu-item" data-page="minhas-propostas">
                    <i class="fas fa-file-alt"></i>
                    <span>Minhas Propostas</span>
                </a>
                
                <a href="#clientes" class="menu-item" data-page="clientes">
                    <i class="fas fa-users"></i>
                    <span>Clientes</span>
                </a>
                
                <a href="#configuracoes" class="menu-item" data-page="configuracoes">
                    <i class="fas fa-cog"></i>
                    <span>Configurações</span>
                </a>
            </nav>
        </aside>

        <!-- Conteúdo Principal -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <button id="sidebar-toggle" class="toggle-btn">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 id="page-title" class="page-title">Dashboard</h1>
                </div>
                
                <div class="header-right">
                    <div class="user-info">
                        <div id="user-avatar" class="user-avatar">A</div>
                        <span id="user-name" class="user-name">Administrador</span>
                    </div>
                    <button id="logout-btn" class="logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                </div>
            </header>

            <!-- Área de Conteúdo -->
            <div id="page-content" class="page-content">
                <!-- O conteúdo será carregado dinamicamente aqui -->
            </div>
        </main>
    </div>

    <!-- Container para Alertas -->
    <div id="alert-container"></div>

    <!-- Scripts -->
    <script src="src/assets/js/app.js"></script>
    <script src="src/assets/js/auth.js"></script>
    <script src="src/assets/js/pages.js"></script>
    
    <script>
        // Inicialização específica da página
        document.addEventListener('DOMContentLoaded', function() {
            // Setup do formulário de login
            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    
                    if (login(username, password)) {
                        // Login bem-sucedido - a função login já cuida da navegação
                        document.getElementById('username').value = '';
                        document.getElementById('password').value = '';
                    }
                });
            }
        });
    </script>

    <style>
        /* Estilos específicos para a tela de login */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #B733F0 0%, #9c2bd1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }

        .login-header {
            background: #B733F0;
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .login-content {
            padding: 30px 20px;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form .btn {
            margin-top: 10px;
        }

        .login-footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        .main-app {
            min-height: 100vh;
        }

        .page-content {
            padding: 0;
        }

        /* Alertas */
        .alert {
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: 5px;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .alert-close {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 0;
            margin-left: 10px;
        }

        /* Responsividade adicional */
        @media (max-width: 768px) {
            .login-container {
                margin: 10px;
            }
            
            .login-content {
                padding: 20px 15px;
            }
        }
    </style>
</body>
</html>
