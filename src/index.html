<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Proposta Contábil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        /* Estilos específicos para login */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-primary-purple), var(--color-primary-blue));
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        
        .login-header {
            background: linear-gradient(135deg, var(--color-primary-blue), var(--color-blue-base-dark));
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .login-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .login-subtitle {
            opacity: 0.9;
            font-size: 16px;
        }
        
        .login-body {
            padding: 40px 30px;
        }
        
        .login-form .form-group {
            margin-bottom: 25px;
        }
        
        .login-form .form-control {
            padding: 15px 20px;
            font-size: 16px;
            border-radius: 8px;
        }
        
        .login-form .btn {
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--color-gray-medium-light);
            color: var(--color-neutral-medium);
            font-size: 14px;
        }
        
        .demo-credentials {
            background: var(--color-gray-lightest);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .demo-credentials strong {
            color: var(--color-primary-blue);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">Proposta Contábil</h1>
                <p class="login-subtitle">Sistema de Gestão de Propostas</p>
            </div>
            
            <div class="login-body">
                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="username" class="form-label">
                            <i class="fas fa-user"></i> Usuário ou Email
                        </label>
                        <input type="text" id="username" class="form-control" required 
                               placeholder="Digite seu usuário ou email">
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> Senha
                        </label>
                        <input type="password" id="password" class="form-control" required 
                               placeholder="Digite sua senha">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>
                </form>
                
                <div class="demo-credentials">
                    <div class="text-center mb-1">
                        <strong>Credenciais de Demonstração:</strong>
                    </div>
                    <div class="text-center">
                        <strong>Usuário:</strong> admin | <strong>Senha:</strong> 123456
                    </div>
                </div>
                
                <div class="login-footer">
                    <p>&copy; 2024 Proposta Contábil. Todos os direitos reservados.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/common.js"></script>
    <script>
        // Configurar formulário de login
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username && password) {
                login(username, password);
            } else {
                showAlert('Por favor, preencha todos os campos!', 'error');
            }
        });
        
        // Auto-preencher campos para demonstração
        document.getElementById('username').value = 'admin';
        document.getElementById('password').value = '123456';
    </script>
</body>
</html>
