<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta Contábil - Gerar Nova Proposta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <!-- Menu Lateral -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Proposta Contábil</div>
        </div>
        
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">
                <i class="fas fa-chart-line"></i>
                <span class="menu-text">Dashboard</span>
            </a>
            <a href="gerar-proposta.html" class="menu-item active">
                <i class="fas fa-plus-circle"></i>
                <span class="menu-text">Gerar nova proposta</span>
            </a>
            <a href="minhas-propostas.html" class="menu-item">
                <i class="fas fa-file-alt"></i>
                <span class="menu-text">Minhas propostas</span>
            </a>
            <a href="clientes.html" class="menu-item">
                <i class="fas fa-users"></i>
                <span class="menu-text">Cadastro de clientes</span>
            </a>
            <a href="configuracoes.html" class="menu-item">
                <i class="fas fa-cog"></i>
                <span class="menu-text">Configurações</span>
            </a>
        </nav>
        
        <div class="toggle-btn" id="toggleBtn">
            <i class="fas fa-chevron-left"></i>
        </div>
    </div>

    <!-- Área Principal -->
    <div class="main-content">
        <header class="header">
            <h1>Gerar Nova Proposta</h1>
            <div class="user-info">
                <span>Bem-vindo, admin!</span>
                <div class="user-avatar">A</div>
                <button class="btn-action" onclick="logout()" title="Sair">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <main class="content">
            <div class="tabs-container">
                <div class="tabs-header">
                    <button class="tab-button active" onclick="showTab(0)">
                        <i class="fas fa-user"></i> Dados do Cliente
                    </button>
                    <button class="tab-button" onclick="showTab(1)">
                        <i class="fas fa-list"></i> Serviços
                    </button>
                    <button class="tab-button" onclick="showTab(2)">
                        <i class="fas fa-handshake"></i> Condições
                    </button>
                    <button class="tab-button" onclick="showTab(3)">
                        <i class="fas fa-eye"></i> Resumo
                    </button>
                </div>

                <!-- Aba 1: Dados do Cliente -->
                <div class="tab-content active">
                    <form id="clienteForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="nomeCliente">Nome/Razão Social *</label>
                                <input type="text" id="nomeCliente" name="nomeCliente" class="form-control required" required>
                            </div>
                            <div class="form-group">
                                <label for="cnpjCliente">CNPJ/CPF *</label>
                                <input type="text" id="cnpjCliente" name="cnpjCliente" class="form-control required" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="emailCliente">E-mail *</label>
                                <input type="email" id="emailCliente" name="emailCliente" class="form-control required" required>
                            </div>
                            <div class="form-group">
                                <label for="telefoneCliente">Telefone *</label>
                                <input type="tel" id="telefoneCliente" name="telefoneCliente" class="form-control required" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="enderecoCliente">Endereço</label>
                                <input type="text" id="enderecoCliente" name="enderecoCliente" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="cidadeCliente">Cidade</label>
                                <input type="text" id="cidadeCliente" name="cidadeCliente" class="form-control">
                            </div>
                        </div>

                        <div class="form-navigation">
                            <div></div>
                            <button type="button" class="btn-next" onclick="nextTab()">Próximo</button>
                        </div>
                    </form>
                </div>

                <!-- Aba 2: Serviços -->
                <div class="tab-content">
                    <div class="form-section">
                        <h3>Serviços Oferecidos</h3>
                        <p>Adicione os serviços que serão prestados para este cliente:</p>
                        
                        <button type="button" class="btn-add-service" onclick="addService()">
                            <i class="fas fa-plus"></i> Adicionar Serviço
                        </button>
                        
                        <div id="servicos-container">
                            <!-- Serviços serão adicionados dinamicamente aqui -->
                        </div>

                        <div class="form-navigation">
                            <button type="button" class="btn-prev" onclick="prevTab()">Anterior</button>
                            <button type="button" class="btn-next" onclick="nextTab()">Próximo</button>
                        </div>
                    </div>
                </div>

                <!-- Aba 3: Condições -->
                <div class="tab-content">
                    <form id="condicoesForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="formaPagamento">Forma de Pagamento</label>
                                <select id="formaPagamento" name="formaPagamento" class="form-control">
                                    <option value="">Selecione...</option>
                                    <option value="a-vista">À Vista</option>
                                    <option value="30-dias">30 dias</option>
                                    <option value="parcelado-2x">Parcelado em 2x</option>
                                    <option value="parcelado-3x">Parcelado em 3x</option>
                                    <option value="mensal">Mensal</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="prazoEntrega">Prazo de Entrega</label>
                                <input type="text" id="prazoEntrega" name="prazoEntrega" class="form-control" placeholder="Ex: 15 dias úteis">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="validadeProposta">Validade da Proposta</label>
                                <input type="text" id="validadeProposta" name="validadeProposta" class="form-control" placeholder="Ex: 30 dias">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="observacoes">Observações Adicionais</label>
                            <textarea id="observacoes" name="observacoes" class="form-control" rows="4" placeholder="Informações adicionais sobre a proposta..."></textarea>
                        </div>

                        <div class="form-navigation">
                            <button type="button" class="btn-prev" onclick="prevTab()">Anterior</button>
                            <button type="button" class="btn-next" onclick="nextTab()">Próximo</button>
                        </div>
                    </form>
                </div>

                <!-- Aba 4: Resumo -->
                <div class="tab-content">
                    <div class="summary-section">
                        <div class="summary-header" onclick="toggleSummary()">
                            <h3>Resumo da Proposta</h3>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="summary-content active" id="summary-content">
                            <!-- Conteúdo será preenchido dinamicamente -->
                        </div>
                    </div>

                    <div class="share-buttons">
                        <button type="button" class="btn-share btn-pdf" onclick="generatePDF()">
                            <i class="fas fa-file-pdf"></i>
                            Gerar PDF
                        </button>
                        <button type="button" class="btn-share btn-link" onclick="generateLink()">
                            <i class="fas fa-link"></i>
                            Gerar Link
                        </button>
                        <button type="button" class="btn-share btn-email" onclick="sendEmail()">
                            <i class="fas fa-envelope"></i>
                            Enviar por E-mail
                        </button>
                    </div>

                    <div class="form-navigation">
                        <button type="button" class="btn-prev" onclick="prevTab()">Anterior</button>
                        <button type="button" class="btn-primary" onclick="saveProposta()">Salvar Proposta</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        // Verificar se está logado
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }

        // Função de logout
        function logout() {
            if (confirm('Tem certeza que deseja sair?')) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            }
        }

        // Inicializar primeira aba
        showTab(0);
    </script>
</body>
</html>
