<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta Contábil - Gerar Proposta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>
    <!-- Menu Lateral -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Proposta Contábil</div>
        </div>
        
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-item" data-page="dashboard">
                <i class="fas fa-chart-line"></i>
                <span class="menu-text">Dashboard</span>
            </a>
            <a href="gerar-proposta.html" class="menu-item active" data-page="gerar-proposta">
                <i class="fas fa-plus-circle"></i>
                <span class="menu-text">Gerar nova proposta</span>
            </a>
            <a href="minhas-propostas.html" class="menu-item" data-page="minhas-propostas">
                <i class="fas fa-file-alt"></i>
                <span class="menu-text">Minhas propostas</span>
            </a>
            <a href="clientes.html" class="menu-item" data-page="cadastro-clientes">
                <i class="fas fa-users"></i>
                <span class="menu-text">Cadastro de clientes</span>
            </a>
            <a href="configuracoes.html" class="menu-item" data-page="configuracoes">
                <i class="fas fa-cog"></i>
                <span class="menu-text">Configurações</span>
            </a>
        </nav>
        
        <div class="toggle-btn" id="toggleBtn">
            <i class="fas fa-chevron-left"></i>
        </div>
    </div>

    <!-- Área Principal -->
    <div class="main-content">
        <header class="header">
            <div class="header-left">
                <div class="logo-header">
                    <div class="logo-icon">PC</div>
                    <h1>Gerar Nova Proposta</h1>
                </div>
            </div>
            <div class="company-info">
                <div class="company-logo">logotipo</div>
                <div class="company-name">NOME DA EMPRESA</div>
                <a href="#" class="user-config">Configurações de usuário</a>
            </div>
        </header>

        <main class="content">
            <form id="gerarPropostaForm" class="proposal-form">
                <!-- Dados do Cliente -->
                <div class="form-section">
                    <h2><i class="fas fa-user"></i> Dados do Cliente</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nomeCliente">Nome do Cliente *</label>
                            <input type="text" id="nomeCliente" name="nomeCliente" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="nomeEmpresa">Nome da Empresa *</label>
                            <input type="text" id="nomeEmpresa" name="nomeEmpresa" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="telefoneWhatsapp">Telefone/WhatsApp *</label>
                            <input type="tel" id="telefoneWhatsapp" name="telefoneWhatsapp" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="emailCliente">E-mail</label>
                            <input type="email" id="emailCliente" name="emailCliente" class="form-control">
                        </div>
                    </div>
                </div>

                <!-- Dados da Proposta -->
                <div class="form-section">
                    <h2><i class="fas fa-file-alt"></i> Dados da Proposta</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="dataProposta">Data da Proposta *</label>
                            <input type="date" id="dataProposta" name="dataProposta" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="validadeDias">Validade (dias) *</label>
                            <input type="number" id="validadeDias" name="validadeDias" class="form-control" value="30" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="vendedorResponsavel">Vendedor Responsável *</label>
                            <select id="vendedorResponsavel" name="vendedorResponsavel" class="form-control" required>
                                <option value="">Selecione um vendedor</option>
                                <option value="João Silva">João Silva</option>
                                <option value="Maria Santos">Maria Santos</option>
                                <option value="Carlos Oliveira">Carlos Oliveira</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Serviços -->
                <div class="form-section">
                    <h2><i class="fas fa-cogs"></i> Serviços</h2>
                    
                    <div class="services-container">
                        <div class="service-item">
                            <h3>Serviços Recorrentes</h3>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="servicoRecorrente">Tipo de Serviço</label>
                                    <select id="servicoRecorrente" name="servicoRecorrente" class="form-control">
                                        <option value="">Selecione um serviço</option>
                                        <option value="Contabilidade Completa">Contabilidade Completa</option>
                                        <option value="Departamento Pessoal">Departamento Pessoal</option>
                                        <option value="Fiscal">Fiscal</option>
                                        <option value="Consultoria">Consultoria</option>
                                    </select>
                                </div>
                                
                                <div class="form-group">
                                    <label for="valorRecorrente">Valor Mensal</label>
                                    <input type="text" id="valorRecorrente" name="valorRecorrente" class="form-control" placeholder="R$ 0,00">
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="descricaoRecorrente">Descrição do Serviço</label>
                                <textarea id="descricaoRecorrente" name="descricaoRecorrente" class="form-control" rows="3"></textarea>
                            </div>
                        </div>

                        <div class="service-item">
                            <h3>Serviços Eventuais</h3>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="servicoEventual">Tipo de Serviço</label>
                                    <select id="servicoEventual" name="servicoEventual" class="form-control">
                                        <option value="">Selecione um serviço</option>
                                        <option value="Abertura de Empresa">Abertura de Empresa</option>
                                        <option value="Alteração Contratual">Alteração Contratual</option>
                                        <option value="Encerramento">Encerramento</option>
                                        <option value="Regularização">Regularização</option>
                                    </select>
                                </div>
                                
                                <div class="form-group">
                                    <label for="valorEventual">Valor</label>
                                    <input type="text" id="valorEventual" name="valorEventual" class="form-control" placeholder="R$ 0,00">
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="descricaoEventual">Descrição do Serviço</label>
                                <textarea id="descricaoEventual" name="descricaoEventual" class="form-control" rows="3"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Condições de Pagamento -->
                <div class="form-section">
                    <h2><i class="fas fa-credit-card"></i> Condições de Pagamento</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="formaPagamento">Forma de Pagamento</label>
                            <select id="formaPagamento" name="formaPagamento" class="form-control">
                                <option value="">Selecione a forma de pagamento</option>
                                <option value="Boleto Bancário">Boleto Bancário</option>
                                <option value="PIX">PIX</option>
                                <option value="Cartão de Crédito">Cartão de Crédito</option>
                                <option value="Transferência Bancária">Transferência Bancária</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="vencimento">Vencimento</label>
                            <select id="vencimento" name="vencimento" class="form-control">
                                <option value="">Selecione o vencimento</option>
                                <option value="Todo dia 5">Todo dia 5</option>
                                <option value="Todo dia 10">Todo dia 10</option>
                                <option value="Todo dia 15">Todo dia 15</option>
                                <option value="Todo dia 20">Todo dia 20</option>
                                <option value="Todo dia 25">Todo dia 25</option>
                                <option value="Todo dia 30">Todo dia 30</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="observacoesPagamento">Observações sobre Pagamento</label>
                        <textarea id="observacoesPagamento" name="observacoesPagamento" class="form-control" rows="3" placeholder="Informações adicionais sobre as condições de pagamento..."></textarea>
                    </div>
                </div>

                <!-- Botões de Ação -->
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="history.back()">
                        <i class="fas fa-arrow-left"></i>
                        Voltar
                    </button>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-file-alt"></i>
                        Gerar Proposta
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script src="assets/js/app.js"></script>
    
    <style>
        /* Estilos específicos para gerar proposta */
        .proposal-form {
            max-width: 1000px;
            margin: 0 auto;
        }

        .form-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .form-section h2 {
            color: var(--color-neutral-dark);
            margin-bottom: 25px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section h2 i {
            color: var(--color-primary-purple);
        }

        .services-container .service-item {
            background: var(--color-gray-lightest);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--color-primary-purple);
        }

        .services-container .service-item h3 {
            color: var(--color-neutral-dark);
            margin-bottom: 15px;
            font-size: 16px;
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 30px;
        }

        .form-actions .btn {
            min-width: 150px;
        }

        @media (max-width: 768px) {
            .form-actions {
                flex-direction: column;
            }
            
            .form-actions .btn {
                width: 100%;
            }
        }

        /* Máscara para valores monetários */
        input[name*="valor"] {
            text-align: right;
        }
    </style>

    <script>
        // Definir data atual como padrão
        document.addEventListener('DOMContentLoaded', function() {
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('dataProposta').value = hoje;
            
            // Aplicar máscara para valores monetários
            const valorInputs = document.querySelectorAll('input[name*="valor"]');
            valorInputs.forEach(input => {
                input.addEventListener('input', function(e) {
                    let value = e.target.value.replace(/\D/g, '');
                    value = (value / 100).toFixed(2);
                    value = value.replace('.', ',');
                    value = value.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
                    e.target.value = 'R$ ' + value;
                });
            });
        });
    </script>
</body>
</html>
