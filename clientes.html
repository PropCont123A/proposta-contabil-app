<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta Contábil - Cadastro de Clientes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Menu Lateral -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Proposta Contábil</div>
        </div>
        
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-item" data-page="dashboard">
                <i class="fas fa-chart-line"></i>
                <span class="menu-text">Dashboard</span>
            </a>
            <a href="gerar-proposta.html" class="menu-item" data-page="gerar-proposta">
                <i class="fas fa-plus-circle"></i>
                <span class="menu-text">Gerar nova proposta</span>
            </a>
            <a href="minhas-propostas.html" class="menu-item" data-page="minhas-propostas">
                <i class="fas fa-file-alt"></i>
                <span class="menu-text">Minhas propostas</span>
            </a>
            <a href="clientes.html" class="menu-item active" data-page="cadastro-clientes">
                <i class="fas fa-users"></i>
                <span class="menu-text">Cadastro de clientes</span>
            </a>
            <a href="configuracoes.html" class="menu-item" data-page="configuracoes">
                <i class="fas fa-cog"></i>
                <span class="menu-text">Configurações</span>
            </a>
        </nav>
        
        <div class="toggle-btn" id="toggleBtn">
            <i class="fas fa-chevron-left"></i>
        </div>
    </div>

    <!-- Área Principal -->
    <div class="main-content">
        <header class="header">
            <h1>Cadastro de Clientes</h1>
            <div class="user-info">
                <span>Bem-vindo, Emerson!</span>
                <div class="user-avatar">E</div>
            </div>
        </header>

        <main class="content">
            <div class="form-container">
                <div class="form-section">
                    <div class="form-section-header" onclick="toggleSection(this)">
                        Dados gerais
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="form-section-content">
                        <div class="form-group">
                            <label for="tipoPessoa">Tipo de pessoa *</label>
                            <select id="tipoPessoa">
                                <option value="fisica">Física</option>
                                <option value="juridica" selected>Jurídica</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="cnpj">CNPJ</label>
                            <div class="input-with-button">
                                <input type="text" id="cnpj" placeholder="00.000.000/0000-00">
                                <button type="button">Buscar dados</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="razaoSocial">Razão Social</label>
                            <input type="text" id="razaoSocial" placeholder="Razão Social">
                        </div>
                        <div class="form-group">
                            <label for="nomeFantasia">Nome Fantasia</label>
                            <input type="text" id="nomeFantasia" placeholder="Nome Fantasia">
                        </div>
                        <div class="form-group">
                            <label for="inscricaoEstadual">Inscrição Estadual</label>
                            <input type="text" id="inscricaoEstadual" placeholder="Isento ou número">
                        </div>
                        <div class="form-group">
                            <label for="inscricaoMunicipal">Inscrição Municipal</label>
                            <input type="text" id="inscricaoMunicipal" placeholder="Número da Inscrição Municipal">
                        </div>
                        <div class="form-group">
                            <label for="dataAbertura">Data de Abertura</label>
                            <input type="date" id="dataAbertura">
                        </div>
                        <div class="form-group">
                            <label for="cnaePrincipal">CNAE Principal</label>
                            <input type="text" id="cnaePrincipal" placeholder="Código CNAE">
                        </div>
                        <div class="form-group">
                            <label for="regimeTributario">Regime Tributário</label>
                            <select id="regimeTributario">
                                <option value="simples">Simples Nacional</option>
                                <option value="lucroPresumido">Lucro Presumido</option>
                                <option value="lucroReal">Lucro Real</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-header" onclick="toggleSection(this)">
                        Endereço
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="form-section-content">
                        <div class="form-group">
                            <label for="cep">CEP</label>
                            <div class="input-with-button">
                                <input type="text" id="cep" placeholder="00000-000">
                                <button type="button">Buscar CEP</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="logradouro">Logradouro</label>
                            <input type="text" id="logradouro" placeholder="Rua, Avenida, etc.">
                        </div>
                        <div class="form-group">
                            <label for="numero">Número</label>
                            <input type="text" id="numero" placeholder="Número">
                        </div>
                        <div class="form-group">
                            <label for="complemento">Complemento</label>
                            <input type="text" id="complemento" placeholder="Apartamento, Sala, etc.">
                        </div>
                        <div class="form-group">
                            <label for="bairro">Bairro</label>
                            <input type="text" id="bairro" placeholder="Bairro">
                        </div>
                        <div class="form-group">
                            <label for="cidade">Cidade</label>
                            <input type="text" id="cidade" placeholder="Cidade">
                        </div>
                        <div class="form-group">
                            <label for="estado">Estado</label>
                            <input type="text" id="estado" placeholder="Estado">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-header" onclick="toggleSection(this)">
                        Contato
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="form-section-content">
                        <div class="form-group">
                            <label for="telefonePrincipal">Telefone Principal</label>
                            <input type="tel" id="telefonePrincipal" placeholder="(XX) XXXXX-XXXX">
                        </div>
                        <div class="form-group">
                            <label for="telefoneSecundario">Telefone Secundário</label>
                            <input type="tel" id="telefoneSecundario" placeholder="(XX) XXXXX-XXXX">
                        </div>
                        <div class="form-group">
                            <label for="emailContato">E-mail de Contato</label>
                            <input type="email" id="emailContato" placeholder="contato@empresa.com">
                        </div>
                        <div class="form-group">
                            <label for="site">Site</label>
                            <input type="text" id="site" placeholder="www.site.com.br">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-header" onclick="toggleSection(this)">
                        Responsáveis
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="form-section-content">
                        <div id="responsaveis-container">
                            <div class="dynamic-field-group">
                                <input type="text" placeholder="Nome do Responsável">
                                <input type="text" placeholder="Cargo">
                                <input type="tel" placeholder="Telefone">
                                <input type="email" placeholder="E-mail">
                                <button type="button" class="remove-btn"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <button type="button" class="btn btn-link" id="add-responsavel"><i class="fas fa-plus"></i> Adicionar Responsável</button>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-header" onclick="toggleSection(this)">
                        Observações
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="form-section-content">
                        <div class="form-group">
                            <label for="observacoes">Observações Adicionais</label>
                            <textarea id="observacoes" rows="5" placeholder="Informações importantes sobre o cliente..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Cliente</button>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/script.js"></script>
    <script>
        function toggleSection(header) {
            const content = header.nextElementSibling;
            const icon = header.querySelector("i");
            content.style.display = content.style.display === "grid" ? "none" : "grid";
            icon.classList.toggle("fa-chevron-down");
            icon.classList.toggle("fa-chevron-up");
        }

        document.addEventListener("DOMContentLoaded", function() {
            // Abrir todas as seções por padrão ao carregar a página
            document.querySelectorAll(".form-section-header").forEach(header => {
                const content = header.nextElementSibling;
                const icon = header.querySelector("i");
                content.style.display = "grid";
                icon.classList.remove("fa-chevron-down");
                icon.classList.add("fa-chevron-up");
            });

            // Adicionar/Remover Responsáveis
            document.getElementById("add-responsavel").addEventListener("click", function() {
                const container = document.getElementById("responsaveis-container");
                const newField = document.createElement("div");
                newField.classList.add("dynamic-field-group");
                newField.innerHTML = `
                    <input type="text" placeholder="Nome do Responsável">
                    <input type="text" placeholder="Cargo">
                    <input type="tel" placeholder="Telefone">
                    <input type="email" placeholder="E-mail">
                    <button type="button" class="remove-btn"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(newField);
                attachRemoveListeners();
            });

            function attachRemoveListeners() {
                document.querySelectorAll(".remove-btn").forEach(button => {
                    button.onclick = function() {
                        this.closest(".dynamic-field-group").remove();
                    };
                });
            }

            attachRemoveListeners(); // Anexar listeners para os campos existentes
        });
    </script>
</body>
</html>
