<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta Contábil - Cadastro de Clientes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <!-- Menu Lateral -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Proposta Contábil</div>
        </div>
        
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">
                <i class="fas fa-chart-line"></i>
                <span class="menu-text">Dashboard</span>
            </a>
            <a href="gerar-proposta.html" class="menu-item">
                <i class="fas fa-plus-circle"></i>
                <span class="menu-text">Gerar nova proposta</span>
            </a>
            <a href="minhas-propostas.html" class="menu-item">
                <i class="fas fa-file-alt"></i>
                <span class="menu-text">Minhas propostas</span>
            </a>
            <a href="clientes.html" class="menu-item active">
                <i class="fas fa-users"></i>
                <span class="menu-text">Cadastro de clientes</span>
            </a>
            <a href="configuracoes.html" class="menu-item">
                <i class="fas fa-cog"></i>
                <span class="menu-text">Configurações</span>
            </a>
        </nav>
        
        <div class="toggle-btn" id="toggleBtn">
            <i class="fas fa-chevron-left"></i>
        </div>
    </div>

    <!-- Área Principal -->
    <div class="main-content">
        <header class="header">
            <h1>Cadastro de Clientes</h1>
            <div class="user-info">
                <span>Bem-vindo, admin!</span>
                <div class="user-avatar">A</div>
                <button class="btn-action" title="Sair">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <main class="content">
            <div class="tabs-container">
                <div class="tabs-header">
                    <button class="tab-button active" onclick="showTab(0)">Novo Cliente</button>
                    <button class="tab-button" onclick="showTab(1)">Lista de Clientes</button>
                </div>

                <!-- Aba 1: Novo Cliente -->
                <div class="tab-content active">
                    <h3>Cadastro de Novo Cliente</h3>
                    <form id="clienteForm" onsubmit="saveClient(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="nomeCliente">Nome/Razão Social *</label>
                                <input type="text" id="nomeCliente" name="nomeCliente" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="cnpjCliente">CNPJ/CPF *</label>
                                <input type="text" id="cnpjCliente" name="cnpjCliente" class="form-control" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="emailCliente">E-mail *</label>
                                <input type="email" id="emailCliente" name="emailCliente" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="telefoneCliente">Telefone *</label>
                                <input type="tel" id="telefoneCliente" name="telefoneCliente" class="form-control" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="enderecoCliente">Endereço</label>
                                <input type="text" id="enderecoCliente" name="enderecoCliente" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="cidadeCliente">Cidade</label>
                                <input type="text" id="cidadeCliente" name="cidadeCliente" class="form-control">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="estadoCliente">Estado</label>
                                <select id="estadoCliente" name="estadoCliente" class="form-control">
                                    <option value="">Selecione...</option>
                                    <option value="AC">Acre</option>
                                    <option value="AL">Alagoas</option>
                                    <option value="AP">Amapá</option>
                                    <option value="AM">Amazonas</option>
                                    <option value="BA">Bahia</option>
                                    <option value="CE">Ceará</option>
                                    <option value="DF">Distrito Federal</option>
                                    <option value="ES">Espírito Santo</option>
                                    <option value="GO">Goiás</option>
                                    <option value="MA">Maranhão</option>
                                    <option value="MT">Mato Grosso</option>
                                    <option value="MS">Mato Grosso do Sul</option>
                                    <option value="MG">Minas Gerais</option>
                                    <option value="PA">Pará</option>
                                    <option value="PB">Paraíba</option>
                                    <option value="PR">Paraná</option>
                                    <option value="PE">Pernambuco</option>
                                    <option value="PI">Piauí</option>
                                    <option value="RJ">Rio de Janeiro</option>
                                    <option value="RN">Rio Grande do Norte</option>
                                    <option value="RS">Rio Grande do Sul</option>
                                    <option value="RO">Rondônia</option>
                                    <option value="RR">Roraima</option>
                                    <option value="SC">Santa Catarina</option>
                                    <option value="SP">São Paulo</option>
                                    <option value="SE">Sergipe</option>
                                    <option value="TO">Tocantins</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="cepCliente">CEP</label>
                                <input type="text" id="cepCliente" name="cepCliente" class="form-control">
                            </div>
                        </div>

                        <div class="form-navigation">
                            <button type="button" class="btn-secondary" onclick="clearClientForm()">Limpar</button>
                            <button type="submit" class="btn-primary">Salvar Cliente</button>
                        </div>
                    </form>
                </div>

                <!-- Aba 2: Lista de Clientes -->
                <div class="tab-content">
                    <h3>Lista de Clientes</h3>
                    
                    <div class="filters-section">
                        <div class="filters-left">
                            <div class="filter-group">
                                <label for="searchClients">Buscar Cliente</label>
                                <input type="text" id="searchClients" class="filter-control" placeholder="Nome ou CNPJ/CPF..." oninput="filterClients()">
                            </div>
                        </div>
                    </div>

                    <div class="clients-container">
                        <div class="clients-header">
                            <h3>Clientes Cadastrados</h3>
                        </div>
                        <div class="clients-list" id="clientsList">
                            <div class="empty-state">
                                <i class="fas fa-users"></i>
                                <h3>Nenhum cliente cadastrado</h3>
                                <p>Adicione clientes para começar a criar propostas.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
