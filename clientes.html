<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta Contábil - Cadastro de Clientes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>
    <!-- Menu Lateral -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Proposta Contábil</div>
        </div>
        
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">
                <i class="fas fa-chart-line"></i>
                <span class="menu-text">Dashboard</span>
            </a>
            <a href="gerar-proposta.html" class="menu-item">
                <i class="fas fa-plus-circle"></i>
                <span class="menu-text">Gerar nova proposta</span>
            </a>
            <a href="minhas-propostas.html" class="menu-item">
                <i class="fas fa-file-alt"></i>
                <span class="menu-text">Minhas propostas</span>
            </a>
            <a href="clientes.html" class="menu-item active">
                <i class="fas fa-users"></i>
                <span class="menu-text">Cadastro de clientes</span>
            </a>
            <a href="configuracoes.html" class="menu-item">
                <i class="fas fa-cog"></i>
                <span class="menu-text">Configurações</span>
            </a>
        </nav>
        
        <div class="toggle-btn" id="toggleBtn">
            <i class="fas fa-chevron-left"></i>
        </div>
    </div>

    <!-- Área Principal -->
    <div class="main-content">
        <header class="header">
            <h1>Cadastro de Clientes</h1>
            <div class="user-info">
                <span id="welcomeUser">Bem-vindo!</span>
                <div class="user-avatar" id="userAvatar">U</div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </header>

        <main class="content">
            <div class="tabs-container">
                <div class="tabs-header">
                    <button class="tab-button active" onclick="showTabByName('novo-cliente')">Novo Cliente</button>
                    <button class="tab-button" onclick="showTabByName('lista-clientes')">Lista de Clientes</button>
                </div>

                <!-- Aba 1: Novo Cliente -->
                <div id="novo-cliente" class="tab-content active">
                    <form id="clienteForm" onsubmit="saveClient(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="nomeCliente">Nome/Razão Social *</label>
                                <input type="text" id="nomeCliente" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="cnpjCliente">CNPJ/CPF *</label>
                                <input type="text" id="cnpjCliente" class="form-control" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="emailCliente">E-mail *</label>
                                <input type="email" id="emailCliente" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="telefoneCliente">Telefone *</label>
                                <input type="tel" id="telefoneCliente" class="form-control" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="enderecoCliente">Endereço</label>
                                <input type="text" id="enderecoCliente" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="cidadeCliente">Cidade</label>
                                <input type="text" id="cidadeCliente" class="form-control">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="estadoCliente">Estado</label>
                                <select id="estadoCliente" class="form-control">
                                    <option value="">Selecione...</option>
                                    <option value="AC">Acre</option>
                                    <option value="AL">Alagoas</option>
                                    <option value="AP">Amapá</option>
                                    <option value="AM">Amazonas</option>
                                    <option value="BA">Bahia</option>
                                    <option value="CE">Ceará</option>
                                    <option value="DF">Distrito Federal</option>
                                    <option value="ES">Espírito Santo</option>
                                    <option value="GO">Goiás</option>
                                    <option value="MA">Maranhão</option>
                                    <option value="MT">Mato Grosso</option>
                                    <option value="MS">Mato Grosso do Sul</option>
                                    <option value="MG">Minas Gerais</option>
                                    <option value="PA">Pará</option>
                                    <option value="PB">Paraíba</option>
                                    <option value="PR">Paraná</option>
                                    <option value="PE">Pernambuco</option>
                                    <option value="PI">Piauí</option>
                                    <option value="RJ">Rio de Janeiro</option>
                                    <option value="RN">Rio Grande do Norte</option>
                                    <option value="RS">Rio Grande do Sul</option>
                                    <option value="RO">Rondônia</option>
                                    <option value="RR">Roraima</option>
                                    <option value="SC">Santa Catarina</option>
                                    <option value="SP">São Paulo</option>
                                    <option value="SE">Sergipe</option>
                                    <option value="TO">Tocantins</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="cepCliente">CEP</label>
                                <input type="text" id="cepCliente" class="form-control" placeholder="00000-000">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="observacoesCliente">Observações</label>
                                <textarea id="observacoesCliente" class="form-control" rows="3"></textarea>
                            </div>
                        </div>

                        <div style="text-align: center; margin-top: 30px;">
                            <button type="submit" class="btn-primary">
                                <i class="fas fa-save"></i> Salvar Cliente
                            </button>
                            <button type="button" class="btn-secondary" onclick="clearForm()">
                                <i class="fas fa-eraser"></i> Limpar
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Aba 2: Lista de Clientes -->
                <div id="lista-clientes" class="tab-content">
                    <div class="search-section">
                        <input type="text" class="search-input" id="searchClients" placeholder="Buscar clientes..." onkeyup="filterClients()">
                    </div>
                    
                    <div class="clients-list" id="clientsList">
                        <!-- Clientes serão carregados dinamicamente -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
