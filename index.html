<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta Contábil - Sistema de Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>Proposta Contábil</h1>
                <p>Sistema de Gestão de Propostas</p>
            </div>
            
            <div class="login-content">
                <div class="login-tabs">
                    <button class="tab-button active" onclick="showTab('login')">Login</button>
                    <button class="tab-button" onclick="showTab('cadastro')">Cadastro</button>
                </div>
                
                <!-- Aba Login -->
                <div id="login" class="tab-content active">
                    <form id="loginForm" onsubmit="login(event)">
                        <div class="form-group">
                            <label for="loginUser">Usuário:</label>
                            <input type="text" id="loginUser" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="loginPassword">Senha:</label>
                            <input type="password" id="loginPassword" class="form-control" required>
                        </div>
                        
                        <button type="submit" class="btn-primary">Entrar</button>
                    </form>
                </div>
                
                <!-- Aba Cadastro -->
                <div id="cadastro" class="tab-content">
                    <form id="registerForm" onsubmit="register(event)">
                        <div class="form-group">
                            <label for="registerName">Nome Completo:</label>
                            <input type="text" id="registerName" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="registerUser">Usuário:</label>
                            <input type="text" id="registerUser" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="registerPassword">Senha:</label>
                            <input type="password" id="registerPassword" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="registerConfirmPassword">Confirmar Senha:</label>
                            <input type="password" id="registerConfirmPassword" class="form-control" required>
                        </div>
                        
                        <button type="submit" class="btn-primary">Cadastrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
