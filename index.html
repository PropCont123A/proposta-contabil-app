<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta Contábil - Sistema de Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        /* Estilos específicos da página de login */
        body {
            background: linear-gradient(135deg, var(--color-primary-purple), var(--color-primary-pink));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }

        .login-header {
            background: linear-gradient(135deg, var(--color-primary-blue), var(--color-primary-purple));
            color: white;
            text-align: center;
            padding: 40px 30px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .login-content {
            padding: 40px 30px;
        }

        .tab-buttons {
            display: flex;
            margin-bottom: 30px;
            background: var(--color-gray-extra-light);
            border-radius: 10px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--color-primary-purple);
            color: white;
            box-shadow: 0 4px 10px rgba(183, 51, 240, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--color-neutral-dark);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--color-gray-light);
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-primary-purple);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--color-primary-purple), var(--color-purple-base-dark));
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(183, 51, 240, 0.3);
        }

        .login-form {
            display: none;
        }

        .login-form.active {
            display: block;
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }

        .forgot-password a {
            color: var(--color-primary-purple);
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Proposta Contábil</h1>
            <p>Sistema de Gestão de Propostas</p>
        </div>
        
        <div class="login-content">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showLoginTab('login')">Login</button>
                <button class="tab-btn" onclick="showLoginTab('cadastro')">Cadastro</button>
            </div>
            
            <!-- Formulário de Login -->
            <form class="login-form active" id="loginForm">
                <div class="form-group">
                    <label for="usuario">Usuário:</label>
                    <input type="text" id="usuario" name="usuario" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" class="form-control" required>
                </div>
                
                <button type="submit" class="btn-login">Entrar</button>
                
                <div class="forgot-password">
                    <a href="#">Esqueceu sua senha?</a>
                </div>
            </form>
            
            <!-- Formulário de Cadastro -->
            <form class="login-form" id="cadastroForm">
                <div class="form-group">
                    <label for="nomeUsuario">Nome Completo:</label>
                    <input type="text" id="nomeUsuario" name="nomeUsuario" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="emailUsuario">E-mail:</label>
                    <input type="email" id="emailUsuario" name="emailUsuario" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="usuarioCadastro">Usuário:</label>
                    <input type="text" id="usuarioCadastro" name="usuarioCadastro" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="senhaCadastro">Senha:</label>
                    <input type="password" id="senhaCadastro" name="senhaCadastro" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="confirmarSenha">Confirmar Senha:</label>
                    <input type="password" id="confirmarSenha" name="confirmarSenha" class="form-control" required>
                </div>
                
                <button type="submit" class="btn-login">Cadastrar</button>
            </form>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        // Funções específicas da página de login
        function showLoginTab(tab) {
            const loginForms = document.querySelectorAll('.login-form');
            const tabButtons = document.querySelectorAll('.tab-btn');
            
            // Remove active de todos
            loginForms.forEach(form => form.classList.remove('active'));
            tabButtons.forEach(btn => btn.classList.remove('active'));
            
            // Ativa o selecionado
            if (tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
                tabButtons[0].classList.add('active');
            } else {
                document.getElementById('cadastroForm').classList.add('active');
                tabButtons[1].classList.add('active');
            }
        }

        // Processar login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;
            
            // Validação simples (usuário: admin, senha: 123456)
            if (usuario === 'admin' && senha === '123456') {
                // Salvar estado de login
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', usuario);
                
                // Redirecionar para dashboard
                window.location.href = 'dashboard.html';
            } else {
                alert('Usuário ou senha incorretos!');
            }
        });

        // Processar cadastro
        document.getElementById('cadastroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nomeUsuario').value;
            const email = document.getElementById('emailUsuario').value;
            const usuario = document.getElementById('usuarioCadastro').value;
            const senha = document.getElementById('senhaCadastro').value;
            const confirmarSenha = document.getElementById('confirmarSenha').value;
            
            if (senha !== confirmarSenha) {
                alert('As senhas não coincidem!');
                return;
            }
            
            // Salvar usuário (simulação)
            const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
            usuarios.push({
                nome,
                email,
                usuario,
                senha,
                dataCadastro: new Date().toLocaleDateString()
            });
            
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
            
            alert('Usuário cadastrado com sucesso! Faça login para continuar.');
            showLoginTab('login');
        });

        // Verificar se já está logado
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
