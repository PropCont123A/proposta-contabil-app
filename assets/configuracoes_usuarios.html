<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta Contábil - Configurações de Usuários</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <!-- Menu Lateral -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Proposta Contábil</div>
        </div>
        
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">
                <i class="fas fa-chart-line"></i>
                <span class="menu-text">Dashboard</span>
            </a>
            <a href="gerar-proposta.html" class="menu-item">
                <i class="fas fa-plus-circle"></i>
                <span class="menu-text">Gerar nova proposta</span>
            </a>
            <a href="minhas-propostas.html" class="menu-item">
                <i class="fas fa-file-alt"></i>
                <span class="menu-text">Minhas propostas</span>
            </a>
            <a href="clientes.html" class="menu-item">
                <i class="fas fa-users"></i>
                <span class="menu-text">Cadastro de clientes</span>
            </a>
            <a href="configuracoes.html" class="menu-item active">
                <i class="fas fa-cog"></i>
                <span class="menu-text">Configurações</span>
            </a>
        </nav>
        
        <div class="toggle-btn" id="toggleBtn">
            <i class="fas fa-chevron-left"></i>
        </div>
    </div>

    <!-- Área Principal -->
    <div class="main-content">
        <header class="header">
            <h1>Configurações de Usuários</h1>
            <div class="user-info">
                <span>Bem-vindo, admin!</span>
                <div class="user-avatar">A</div>
                <button class="btn-action" onclick="logout()" title="Sair">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <main class="content">
            <div class="tabs-container">
                <div class="tabs-header">
                    <button class="tab-button active" onclick="showTab(0)">
                        <i class="fas fa-user-plus"></i> Novo Usuário
                    </button>
                    <button class="tab-button" onclick="showTab(1)">
                        <i class="fas fa-users"></i> Lista de Usuários
                    </button>
                </div>

                <!-- Aba 1: Novo Usuário -->
                <div class="tab-content active">
                    <form id="usuarioForm" onsubmit="saveUser(event)">
                        <div class="config-section">
                            <h4 class="section-title">Dados do Usuário</h4>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="nomeUsuario">Nome Completo *</label>
                                    <input type="text" id="nomeUsuario" name="nomeUsuario" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label for="emailUsuario">E-mail *</label>
                                    <input type="email" id="emailUsuario" name="emailUsuario" class="form-control" required>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="usuarioLogin">Usuário/Login *</label>
                                    <input type="text" id="usuarioLogin" name="usuarioLogin" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label for="telefoneUsuario">Telefone</label>
                                    <input type="tel" id="telefoneUsuario" name="telefoneUsuario" class="form-control">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="senhaUsuario">Senha *</label>
                                    <input type="password" id="senhaUsuario" name="senhaUsuario" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label for="confirmarSenhaUsuario">Confirmar Senha *</label>
                                    <input type="password" id="confirmarSenhaUsuario" name="confirmarSenhaUsuario" class="form-control" required>
                                </div>
                            </div>
                        </div>

                        <div class="config-section">
                            <h4 class="section-title">Permissões</h4>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="tipoUsuario">Tipo de Usuário</label>
                                    <select id="tipoUsuario" name="tipoUsuario" class="form-control">
                                        <option value="gestor">Gestor</option>
                                        <option value="usuario_regular" selected>Usuário Regular</option>
                                        <option value="visualizador">Visualizador</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="statusUsuario">Status</label>
                                    <select id="statusUsuario" name="statusUsuario" class="form-control">
                                        <option value="ativo" selected>Ativo</option>
                                        <option value="inativo">Inativo</option>
                                        <option value="bloqueado">Bloqueado</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Permissões Específicas</label>
                                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 10px;">
                                    <label style="display: flex; align-items: center; gap: 8px;">
                                        <input type="checkbox" id="permGerar" name="permissoes" value="gerar_propostas" checked>
                                        Gerar Propostas
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px;">
                                        <input type="checkbox" id="permEditar" name="permissoes" value="editar_propostas" checked>
                                        Editar Propostas
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px;">
                                        <input type="checkbox" id="permExcluir" name="permissoes" value="excluir_propostas">
                                        Excluir Propostas
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px;">
                                        <input type="checkbox" id="permClientes" name="permissoes" value="gerenciar_clientes" checked>
                                        Gerenciar Clientes
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px;">
                                        <input type="checkbox" id="permConfig" name="permissoes" value="configuracoes">
                                        Configurações
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px;">
                                        <input type="checkbox" id="permRelatorios" name="permissoes" value="relatorios">
                                        Relatórios
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="form-navigation">
                            <button type="button" class="btn-secondary" onclick="clearUserForm()">Limpar</button>
                            <button type="submit" class="btn-primary">Salvar Usuário</button>
                        </div>
                    </form>
                </div>

                <!-- Aba 2: Lista de Usuários -->
                <div class="tab-content">
                    <div class="filters-section">
                        <div class="filters-left">
                            <div class="filter-group">
                                <label>Buscar Usuário</label>
                                <input type="text" id="searchUsers" class="filter-control" placeholder="Nome ou e-mail..." onkeyup="filterUsers()">
                            </div>
                            <div class="filter-group">
                                <label>Status</label>
                                <select id="filterUserStatus" class="filter-control" onchange="filterUsers()">
                                    <option value="">Todos</option>
                                    <option value="ativo">Ativo</option>
                                    <option value="inativo">Inativo</option>
                                    <option value="bloqueado">Bloqueado</option>
                                </select>
                            </div>
                        </div>
                        <button class="btn-new-proposal" onclick="showTab(0)">
                            <i class="fas fa-plus"></i>
                            Novo Usuário
                        </button>
                    </div>

                    <div class="clients-container">
                        <div class="clients-header">
                            <h3>Lista de Usuários</h3>
                        </div>
                        <div class="clients-list" id="usersList">
                            <!-- Usuários serão carregados dinamicamente aqui -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        // Verificar se está logado
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }

        // Função de logout
        function logout() {
            if (confirm('Tem certeza que deseja sair?')) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            }
        }

        // Funções específicas de usuários
        function saveUser(event) {
            event.preventDefault();
            
            const senha = document.getElementById('senhaUsuario').value;
            const confirmarSenha = document.getElementById('confirmarSenhaUsuario').value;
            
            if (senha !== confirmarSenha) {
                alert('As senhas não coincidem!');
                return;
            }
            
            const usuario = {
                id: Date.now().toString(),
                nome: document.getElementById('nomeUsuario').value,
                email: document.getElementById('emailUsuario').value,
                login: document.getElementById('usuarioLogin').value,
                telefone: document.getElementById('telefoneUsuario').value,
                senha: senha,
                tipo: document.getElementById('tipoUsuario').value,
                status: document.getElementById('statusUsuario').value,
                permissoes: Array.from(document.querySelectorAll('input[name="permissoes"]:checked')).map(cb => cb.value),
                dataCadastro: new Date().toLocaleDateString()
            };
            
            const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
            usuarios.push(usuario);
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
            
            alert('Usuário cadastrado com sucesso!');
            clearUserForm();
            loadUsers();
        }

        function clearUserForm() {
            document.getElementById('usuarioForm').reset();
            // Reativar checkboxes padrão
            document.getElementById('permGerar').checked = true;
            document.getElementById('permEditar').checked = true;
            document.getElementById('permClientes').checked = true;
        }

        function loadUsers() {
            const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
            const usersList = document.getElementById('usersList');
            
            if (!usersList) return;
            
            if (usuarios.length === 0) {
                usersList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-users"></i>
                        <h3>Nenhum usuário cadastrado</h3>
                        <p>Adicione usuários para gerenciar o acesso ao sistema.</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            usuarios.forEach((usuario, index) => {
                const statusClass = usuario.status === 'ativo' ? 'status-contratada' : 
                                  usuario.status === 'inativo' ? 'status-enviada' : 'status-rejeitada';
                
                html += `
                    <div class="client-item" data-name="${usuario.nome.toLowerCase()}" data-email="${usuario.email.toLowerCase()}" data-status="${usuario.status}">
                        <div class="client-header">
                            <div class="client-info">
                                <div class="client-name">${usuario.nome}</div>
                                <div class="client-details">
                                    <div><strong>Login:</strong> ${usuario.login}</div>
                                    <div><strong>E-mail:</strong> ${usuario.email}</div>
                                    <div><strong>Telefone:</strong> ${usuario.telefone || 'Não informado'}</div>
                                    <div><strong>Tipo:</strong> ${getTipoUsuarioText(usuario.tipo)}</div>
                                    <div><strong>Cadastrado em:</strong> ${usuario.dataCadastro}</div>
                                </div>
                            </div>
                            <div class="client-actions">
                                <span class="proposal-status ${statusClass}">${getStatusText(usuario.status)}</span>
                                <button class="btn-action" onclick="editUser(${index})" title="Editar">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn-action" onclick="toggleUserStatus(${index})" title="Alterar Status">
                                    <i class="fas fa-toggle-on"></i>
                                </button>
                                <button class="btn-action delete" onclick="deleteUser(${index})" title="Excluir">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            usersList.innerHTML = html;
        }

        function getTipoUsuarioText(tipo) {
            const tipos = {
                'gestor': 'Gestor',
                'usuario_regular': 'Usuário Regular',
                'visualizador': 'Visualizador'
            };
            return tipos[tipo] || tipo;
        }

        function getStatusText(status) {
            const statusMap = {
                'ativo': 'Ativo',
                'inativo': 'Inativo',
                'bloqueado': 'Bloqueado'
            };
            return statusMap[status] || status;
        }

        function editUser(index) {
            alert('Funcionalidade de edição será implementada em breve!');
        }

        function toggleUserStatus(index) {
            const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
            const usuario = usuarios[index];
            
            if (!usuario) return;
            
            // Alternar status
            if (usuario.status === 'ativo') {
                usuario.status = 'inativo';
            } else {
                usuario.status = 'ativo';
            }
            
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
            loadUsers();
            alert(`Status do usuário alterado para: ${getStatusText(usuario.status)}`);
        }

        function deleteUser(index) {
            if (confirm('Tem certeza que deseja excluir este usuário?')) {
                const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
                usuarios.splice(index, 1);
                localStorage.setItem('usuarios', JSON.stringify(usuarios));
                loadUsers();
            }
        }

        function filterUsers() {
            const searchTerm = document.getElementById('searchUsers')?.value.toLowerCase() || '';
            const statusFilter = document.getElementById('filterUserStatus')?.value || '';
            const userItems = document.querySelectorAll('.client-item');
            
            userItems.forEach(item => {
                const name = item.dataset.name || '';
                const email = item.dataset.email || '';
                const status = item.dataset.status || '';
                
                let show = true;
                
                if (searchTerm && !name.includes(searchTerm) && !email.includes(searchTerm)) {
                    show = false;
                }
                
                if (statusFilter && status !== statusFilter) {
                    show = false;
                }
                
                item.style.display = show ? 'block' : 'none';
            });
        }

        // Carregar usuários ao inicializar a página
        document.addEventListener('DOMContentLoaded', function() {
            loadUsers();
        });
    </script>
</body>
</html>
